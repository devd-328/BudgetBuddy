<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetBuddy — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .emoji { font-size: 4rem; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: rgba(255,255,255,0.4); font-size: 0.9rem; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 1rem;
      background: #378ADD;
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="emoji">??</div>
  <h1>You're offline</h1>
  <p>BudgetBuddy needs a connection to sync your data. Check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
